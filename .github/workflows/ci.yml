name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - product-hardening/**

permissions:
  contents: read

jobs:
  agent-reality-gate:
    name: Agent reality gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent reality gate scaffold
        run: |
          python3 tools/agent_reality_gate_lint.py \
            --laws docs/ops/system-laws.jsonl \
            --schema docs/ops/agent-trace.schema.json \
            --evals docs/ops/agent-eval-cases.jsonl \
            --trace docs/ops/examples/agent-trace.example.json
          if python3 tools/agent_reality_gate_lint.py \
            --laws docs/ops/system-laws.jsonl \
            --schema docs/ops/agent-trace.schema.json \
            --evals docs/ops/agent-eval-cases.jsonl \
            --trace docs/ops/examples/agent-trace.invalid-missing-system-laws.json; then
            echo "agent trace without system law binding unexpectedly passed"
            exit 1
          fi

      - name: Validate system laws gate scaffold
        run: |
          python3 tools/system_laws_lint.py \
            --laws docs/ops/system-laws.jsonl
          if python3 tools/system_laws_lint.py \
            --laws docs/ops/examples/system-laws.invalid-missing-fail-gate.jsonl; then
            echo "system laws row without fail-under-broken gate unexpectedly passed"
            exit 1
          fi
          if python3 tools/system_laws_lint.py \
            --laws docs/ops/examples/system-laws.invalid-unbound-fail-gate.jsonl; then
            echo "system laws row with unbound fail-under-broken gate unexpectedly passed"
            exit 1
          fi
          python3 tools/system_laws_test_inventory.py \
            --laws docs/ops/examples/system-laws.valid-test-inventory.jsonl \
            --test-list-file docs/ops/examples/cargo-test-list.example.txt
          if python3 tools/system_laws_test_inventory.py \
            --laws docs/ops/examples/system-laws.invalid-missing-test.jsonl \
            --test-list-file docs/ops/examples/cargo-test-list.example.txt; then
            echo "system law row with missing cargo test gate unexpectedly passed"
            exit 1
          fi
          if python3 tools/system_laws_test_inventory.py \
            --laws docs/ops/examples/system-laws.invalid-missing-local-gate.jsonl; then
            echo "system law row with missing local runtime gate unexpectedly passed"
            exit 1
          fi

      - name: Validate PR invariant body
        run: |
          python3 tools/pr_invariant_gate.py
          python3 tools/pr_invariant_gate.py \
            --body-file docs/ops/examples/pr-body.valid.md
          if python3 tools/pr_invariant_gate.py \
            --body-file docs/ops/examples/pr-body.invalid-missing-fail-gate.md; then
            echo "PR body without fail-under-broken section unexpectedly passed"
            exit 1
          fi

  rust-baseline:
    name: Rust baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile all targets
        run: cargo check --workspace --all-targets

      - name: System laws test inventory
        run: python3 tools/system_laws_test_inventory.py --laws docs/ops/system-laws.jsonl

      - name: Clippy baseline
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit and integration tests
        run: cargo test --workspace --all-targets

      - name: Replay eval fixture gate
        run: |
          cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/valid-minimal.jsonl
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-grid2d-missing-dimensions.jsonl; then
            echo "malformed grid2d replay tape unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-string-partition-schema.jsonl; then
            echo "legacy string partition_schema replay tape unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-missing-component-registry.jsonl; then
            echo "replay tape missing component_registry_version unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-op-semantics.jsonl; then
            echo "replay tape with wrong op semantics unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-mesh-op-semantics.jsonl; then
            echo "replay tape with wrong mesh op semantics unexpectedly passed"
            exit 1
          fi

      - name: Release build
        run: cargo build --workspace --release
