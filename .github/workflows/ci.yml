name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - product-hardening/**

permissions:
  contents: read

jobs:
  rust-baseline:
    name: Rust baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: |
          cargo fmt --all
          git diff -- crates/godworks-protocol/src/json.rs crates/godworks-protocol/src/lib.rs > rustfmt.diff
          test ! -s rustfmt.diff

      - name: Upload rustfmt diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diff
          path: rustfmt.diff
          if-no-files-found: ignore

      - name: Compile all targets
        run: cargo check --workspace --all-targets

      - name: Clippy baseline
        run: cargo clippy --workspace --all-targets

      - name: Unit and integration tests
        run: cargo test --workspace --all-targets

      - name: Release build
        run: cargo build --workspace --release
