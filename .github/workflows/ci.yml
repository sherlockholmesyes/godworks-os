name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - product-hardening/**

permissions:
  contents: read

jobs:
  agent-reality-gate:
    name: Agent reality gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent reality gate scaffold
        run: |
          python3 tools/agent_reality_gate_lint.py \
            --schema docs/ops/agent-trace.schema.json \
            --evals docs/ops/agent-eval-cases.jsonl \
            --trace docs/ops/examples/agent-trace.example.json

  rust-baseline:
    name: Rust baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile all targets
        run: cargo check --workspace --all-targets

      - name: Clippy baseline
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit and integration tests
        run: cargo test --workspace --all-targets

      - name: Replay eval fixture gate
        run: |
          cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/valid-minimal.jsonl
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-grid2d-missing-dimensions.jsonl; then
            echo "malformed grid2d replay tape unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-string-partition-schema.jsonl; then
            echo "legacy string partition_schema replay tape unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-missing-component-registry.jsonl; then
            echo "replay tape missing component_registry_version unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-op-semantics.jsonl; then
            echo "replay tape with wrong op semantics unexpectedly passed"
            exit 1
          fi
          if cargo run --quiet --bin replay_eval -- tests/fixtures/replay_eval/invalid-mesh-op-semantics.jsonl; then
            echo "replay tape with wrong mesh op semantics unexpectedly passed"
            exit 1
          fi

      - name: Release build
        run: cargo build --workspace --release
