name: Refresh Cargo.lock

on:
  push:
    branches:
      - product-hardening/protocol-v1-coverage
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: product-hardening/protocol-v1-coverage

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh lockfile
        run: cargo generate-lockfile

      - name: Commit Cargo.lock if changed
        run: |
          git add Cargo.lock
          if git diff --cached --quiet; then
            echo "Cargo.lock already current"
          else
            git commit -m "chore: refresh Cargo.lock workspace entries"
            git push origin HEAD:product-hardening/protocol-v1-coverage
          fi
